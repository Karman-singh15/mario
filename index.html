<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Mario Game Boy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0d0d0d;
      --border-color: rgba(255, 255, 255, 0.8);
    }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--bg-color);
      font-family: 'Inter', system-ui;
      height: 100vh;
      color: white;
    }

    #app-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>

<body>
  <div id="app-container">
    <canvas id="three-canvas"></canvas>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
